<html><head><title>台語 Cheatsheet</title></head><body>

<h2>Unicode</h2>
<ul>
<li>030d: vertical tone marking, e.g. lo̍h (copypaste: a̍ e̍ i̍ o̍ u̍)</li>
<li>0300: diacritic \, e.g. m̀, ǹg
<li>0301: diacritic /, e.g. ḿ, ńg</li>
<li>0302: diacritic ^, e.g. m̂, n̂g</li>
<li>0304: diacritic _, e.g. m̄, n̄g</li>
<li>207f: superscript n, e.g. kuàⁿ</li>
<li>0358: superscript dot, e.g. hō͘</li>
</ul>

</body></html>
